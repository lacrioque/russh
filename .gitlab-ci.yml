stages:
  - lint
  - test
  - build
  - release

variables:
  CARGO_HOME: /usr/local/cargo

# ---------------------------------------------------------------------------
# Lint
# ---------------------------------------------------------------------------
lint:clippy:
  stage: lint
  image: rust:latest
  script:
    - rustup component add clippy
    - cargo clippy --workspace --all-targets -- -D warnings
  cache:
    key: cargo-${CI_COMMIT_REF_SLUG}
    paths:
      - target/
      - $CARGO_HOME/registry/
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:fmt:
  stage: lint
  image: rust:latest
  script:
    - rustup component add rustfmt
    - cargo fmt --check
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ---------------------------------------------------------------------------
# Test
# ---------------------------------------------------------------------------
test:
  stage: test
  image: rust:latest
  script:
    - cargo test --workspace
  cache:
    key: cargo-${CI_COMMIT_REF_SLUG}
    paths:
      - target/
      - $CARGO_HOME/registry/
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------
build:release:
  stage: build
  image: rust:latest
  script:
    - cargo build --release
    - cp target/release/russh russh-cli
  artifacts:
    paths:
      - russh-cli
    expire_in: 30 days
  cache:
    key: cargo-${CI_COMMIT_REF_SLUG}
    paths:
      - target/
      - $CARGO_HOME/registry/
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+/'

# ---------------------------------------------------------------------------
# Release — tagged versions only
# ---------------------------------------------------------------------------
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+/'
  needs:
    - job: build:release
      artifacts: true
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "russh ${CI_COMMIT_TAG}"
    description: "Release ${CI_COMMIT_TAG}"
    assets:
      links:
        - name: "russh-cli (Linux x86_64)"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/russh-cli"
