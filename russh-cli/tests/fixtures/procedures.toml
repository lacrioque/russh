[procedures.backup]
session = "alpha"
description = "Run daily backup script"
commands = ["cd /opt/backup", "./run-backup.sh"]
tags = ["ops", "daily"]

[procedures.deploy]
session = "bravo"
description = "Deploy latest release"
commands = ["cd /app", "git pull origin main", "systemctl restart app"]
