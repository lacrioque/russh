[package]
name = "russh-cli"
version = "0.0.1"
edition = "2021"

[[bin]]
name = "russh"
path = "src/main.rs"

[dependencies]
russh-core = { path = "../russh-core" }
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dirs-next = "2"
inquire = "0.7"
tabled = "0.17"

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"
